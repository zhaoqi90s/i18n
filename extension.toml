id = "i18n-key-translator"
name = "i18n Key Translator"
description = "Hover preview for i18n keys with remote resource caching. Also provides /i18n and /i18n-keys slash commands."
version = "0.2.0"
schema_version = 1
authors = ["zhaoqi90s@gmail.com"]
repository = "https://github.com/zhaoqi90s/i18n"

[slash_commands.i18n]
description = "Look up an i18n key: /i18n <key> [lang]  (e.g. /i18n common.button.save zh)"
requires_argument = true

[slash_commands.i18n-keys]
description = "List all i18n keys for a language: /i18n-keys [lang]  (e.g. /i18n-keys zh)"
requires_argument = false

[slash_commands.i18n-sync]
description = "Show sync status and update remote language pack cache: /i18n-sync [lang]"
requires_argument = false

[slash_commands.i18n-search]
description = "Fuzzy-search translation values and return matching keys: /i18n-search <text> [lang]  (e.g. /i18n-search 保存 zh)"
requires_argument = true

[language_servers.i18n-hover]
name = "i18n Hover"
languages = [
  "JavaScript",
  "TypeScript",
  "JSX",
  "TSX",
  "Vue",
  "Svelte",
  "Python",
  "Rust",
  "Go",
  "Ruby",
  "PHP",
  "Java",
  "Kotlin",
  "Swift",
  "C#",
]
