id = "i18n-key-translator"
name = "i18n Key Translator"
description = "Translate i18n keys to their localized values via /i18n and /i18n-keys slash commands."
version = "0.1.0"
schema_version = 1
authors = ["Your Name <you@example.com>"]
repository = "https://github.com/yourusername/i18n-key-translator"

[slash_commands.i18n]
description = "Look up an i18n key: /i18n <key> [lang]  (e.g. /i18n common.button.save zh)"
requires_argument = true

[slash_commands.i18n-keys]
description = "List all i18n keys for a language: /i18n-keys [lang]  (e.g. /i18n-keys zh)"
requires_argument = false
